<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons</title>
    <style>
    .subscribe-button {
        background-color: rgb(200, 0, 0);
        color: white;
        height: 36px;
        border: none;
        border-radius: 20px;
        width: 100px;
        cursor: pointer;
        margin-right: 8px;
        transition: opacity 0.15s;   
    }

    .subscribe-button:hover {
        opacity: 0.7;
    }

    .subscribe-button:active {
       opacity: 0.4;
    }


    .join-button {
        background-color: white;
        color: rgb(18, 66, 179);
        height: 32px;
        width: 60px;
        border-width: 1px;
        border-style: solid;
        border-color: blue;
        border-radius: 5px;
        margin-right: 8px;
        cursor: pointer;
        transition: background-color 1s, color 1s;

    }

    .join-button:hover {
        background-color: rgb(18, 66, 179);
        color: white;
    }

    .join-button:active {
        opacity: 0.7;
    }


    .tweet-button {
        background-color: rgb(56, 138, 209);
        color: white;
        height: 36px;
        width: 70px;
        border: none;
        border-radius: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: box-shadow 0.15s;
    }

    .tweet-button:hover {
        box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15)
    }

    .tweet-button:active {
        opacity: 0.7;
    }
</style>
</head>
<body>
    <button class="subscribe-button">SUBSCRIBE</button>
    <button class="join-button">JOIN</button>
    <button class="tweet-button">Tweet</button>    
</body>
</html>
