<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons</title>
    <style>
    .subscribe-button {
        background-color: rgb(200, 0, 0);
        color: white;
        padding-bottom: 10px;
        padding-top: 10px;
        padding-left: 10px;
        padding-right: 10px;
        border: none;
        border-radius: 2px;
        cursor: pointer;
        margin-right: 8px;
        transition: opacity 0.15s;   
    }

    .subscribe-button:hover {
        opacity: 0.7;
    }

    .subscribe-button:active {
       opacity: 0.4;
    }


    .join-button {
        background-color: white;
        color: rgb(18, 66, 179);
        padding-bottom: 9px;
        padding-top: 9px;
        padding-left: 15px;
        padding-right: 15px;
        border-width: 1px;
        border-style: solid;
        border-color: blue;
        border-radius: 5px;
        margin-right: 8px;
        cursor: pointer;
        transition: background-color 1s, color 1s;

    }

    .join-button:hover {
        background-color: rgb(18, 66, 179);
        color: white;
    }

    .join-button:active {
        opacity: 0.7;
    }


    .tweet-button {
        background-color: rgb(56, 138, 209);
        color: white;
        padding-bottom: 10px;
        padding-top: 10px;
        padding-left: 12px;
        padding-right: 12px;
        border: none;
        border-radius: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: box-shadow 0.15s;
    }

    .tweet-button:hover {
        box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15)
    }

    .tweet-button:active {
        opacity: 0.7;
    }


    .amazon-button {
      background-color: rgb(255, 222, 6);
      color: black;
      padding-bottom: 10px;
      padding-top: 10px;
      padding-left: 30px;
      padding-right: 30px;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      margin-right: 10px;
      transition: 0.20s;
      
    }

    .amazon-button:hover {
        transition: 0.20s;
        box-shadow: 2px 2px 2px;
        opacity: 0.7;
    }

    .amazon-button:active {
        opacity: 0.5;
    }

    .github-button {
        background-color: rgb(9, 150, 9);
        color: white;
        padding-bottom: 10px;
        padding-top: 10px;
        padding-left: 10px;
        padding-right: 10px;
        border: none;
        border-radius: 5px;
        margin-right: 10px;
        font-weight: bold;
        cursor: pointer;
    }

    .github-button:hover {
        transition: 0.20s;
        opacity: 0.8;
    }

    .github-button:active {
        opacity: 0.5;
    }

    .uber-button {
        background-color: black;
        color: white;
        border: none;
        border-radius: 4px;
        padding-bottom: 10px;
        padding-top: 10px;
        padding-left: 20px;
        padding-right: 20px;
        cursor: pointer;
    }

    .uber-button:hover {
        transition: 0.20s;
        box-shadow: 2px 2px 5px grey;
    }

    .uber-button:active {
        opacity: 0.6;
    }
</style>
</head>
<body>
    <button class="subscribe-button">SUBSCRIBE</button>
    <button class="join-button">JOIN</button>
    <button class="tweet-button">Tweet</button>
    <p>
      <div>
      <button class="amazon-button">Add to Cart</button>    
      <button class="github-button">Sign Up</button>
      <button class="uber-button">Book Cab</button>
      </div>
    </p>            
</body>
</html>
